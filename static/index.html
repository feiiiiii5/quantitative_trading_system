<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QuantVision</title>
<script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root{
  --bg:#fff;--bg2:#f5f5f7;--bg3:#eee;--card:#fff;--text:#1d1d1f;--text2:#86868b;--text3:#aeaeb2;
  --accent:#0071e3;--accent2:#0077ed;--green:#34c759;--red:#ff3b30;--border:#d2d2d7;
  --shadow:0 2px 12px rgba(0,0,0,.08);--radius:12px;--nav-h:52px;
  --chart-green:#26a69a;--chart-red:#ef5350;--chart-vol-green:rgba(38,166,154,.3);--chart-vol-red:rgba(239,83,80,.3);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#000;--bg2:#1c1c1e;--bg3:#2c2c2e;--card:#1c1c1e;--text:#f5f5f7;--text2:#98989d;--text3:#636366;
    --accent:#0a84ff;--accent2:#409cff;--green:#30d158;--red:#ff453a;--border:#38383a;
    --shadow:0 2px 12px rgba(0,0,0,.3);
    --chart-green:#26a69a;--chart-red:#ef5350;--chart-vol-green:rgba(38,166,154,.3);--chart-vol-red:rgba(239,83,80,.3);
  }
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
input{font-family:inherit}

nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.nav-brand{font-size:18px;font-weight:700;letter-spacing:-.3px;margin-right:32px;cursor:pointer}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:6px 16px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text2);transition:all .2s}
.nav-tab:hover{color:var(--text);background:var(--bg3)}
.nav-tab.active{color:var(--accent);background:rgba(0,113,227,.1)}
.nav-status{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.page{display:none;margin-top:var(--nav-h);min-height:calc(100vh - var(--nav-h))}
.page.active{display:block}

.hero{padding:80px 20px 40px;text-align:center}
.hero h1{font-size:42px;font-weight:700;letter-spacing:-1px;margin-bottom:12px}
.hero p{font-size:17px;color:var(--text2);max-width:600px;margin:0 auto 32px;line-height:1.6}

.search-box{max-width:620px;margin:0 auto 48px;position:relative}
.search-input{width:100%;height:52px;border-radius:26px;border:2px solid var(--border);padding:0 56px 0 20px;font-size:16px;background:var(--card);color:var(--text);outline:none;transition:border .2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text3)}
.search-btn{position:absolute;right:6px;top:6px;width:40px;height:40px;border-radius:20px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;transition:background .2s}
.search-btn:hover{background:var(--accent2)}
.search-btn svg{width:18px;height:18px}
.search-dd{position:absolute;top:58px;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);max-height:360px;overflow-y:auto;display:none;z-index:50}
.search-dd.show{display:block}
.search-item{display:flex;align-items:center;padding:10px 16px;cursor:pointer;transition:background .15s;gap:12px}
.search-item:hover{background:var(--bg2)}
.search-item .si-code{font-weight:600;font-size:14px;min-width:80px}
.search-item .si-name{font-size:14px;flex:1}
.search-item .si-tag{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--bg3);color:var(--text2)}
.search-item .si-tag.us{background:rgba(0,113,227,.1);color:var(--accent)}
.search-item .si-tag.hk{background:rgba(255,149,0,.1);color:#ff9500}

.section-title{font-size:22px;font-weight:700;margin:0 20px 16px;letter-spacing:-.3px}

.hot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;padding:0 20px 40px}
.hot-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .2s}
.hot-card:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.hot-card .hc-name{font-size:15px;font-weight:600;margin-bottom:2px}
.hot-card .hc-code{font-size:12px;color:var(--text2);margin-bottom:8px}
.hot-card .hc-price{font-size:20px;font-weight:700}
.hot-card .hc-pct{font-size:13px;font-weight:500}
.hot-card .hc-pct.up{color:var(--green)}
.hot-card .hc-pct.down{color:var(--red)}

.market-overview{padding:0 20px 60px}
.market-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.market-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.market-card .mc-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.market-card .mc-val{font-size:22px;font-weight:700}
.market-card .mc-change{font-size:13px;font-weight:500}

.detail-page{padding:20px}
.detail-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.detail-back{width:36px;height:36px;border-radius:18px;background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s}
.detail-back:hover{background:var(--border)}
.detail-back svg{width:18px;height:18px}
.detail-name{font-size:24px;font-weight:700}
.detail-code{font-size:14px;color:var(--text2)}
.detail-price{font-size:28px;font-weight:700;margin-left:auto}
.detail-change{font-size:15px;font-weight:500}

.period-bar{display:flex;gap:4px;margin-bottom:16px;background:var(--bg2);padding:4px;border-radius:10px;width:fit-content}
.period-btn{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text2);transition:all .2s}
.period-btn:hover{color:var(--text)}
.period-btn.active{background:var(--accent);color:#fff}

.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;position:relative}
.chart-container{height:460px}
.chart-loading{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:var(--card);z-index:10;font-size:14px;color:var(--text2)}
.chart-loading .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:768px){.info-grid{grid-template-columns:1fr}}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.info-card h3{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text2)}
.info-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.info-row .label{color:var(--text2)}
.info-row .val{font-weight:500}

.strat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.strat-card .sc-name{font-size:15px;font-weight:600;margin-bottom:4px}
.strat-card .sc-desc{font-size:12px;color:var(--text2);margin-bottom:8px}
.strat-card .sc-score{display:flex;align-items:center;gap:8px}
.score-bar{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.score-fill{height:100%;border-radius:3px;transition:width .3s}
.score-val{font-size:14px;font-weight:600;min-width:40px;text-align:right}

.data-tab{padding:8px 16px;border-bottom:2px solid transparent;font-size:14px;font-weight:500;color:var(--text2);transition:all .2s}
.data-tab:hover{color:var(--text)}
.data-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.data-panel{display:none}
.data-panel.active{display:block}

.sim-page{padding:20px}
.sim-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.sim-stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.sim-stat .ss-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.sim-stat .ss-val{font-size:20px;font-weight:700}
.sim-body{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:900px){.sim-body{grid-template-columns:1fr}}
.sim-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.sim-panel h3{font-size:15px;font-weight:600;margin-bottom:12px}

.pos-table{width:100%;border-collapse:collapse;font-size:13px}
.pos-table th{text-align:left;padding:8px 6px;border-bottom:1px solid var(--border);color:var(--text2);font-weight:500}
.pos-table td{padding:8px 6px;border-bottom:1px solid var(--border)}
.pos-table .up{color:var(--green)}
.pos-table .down{color:var(--red)}
.btn-sm{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:500;background:var(--bg3);transition:background .2s}
.btn-sm:hover{background:var(--border)}
.btn-sm.danger{color:var(--red)}

.auto-panel{margin-top:16px}
.auto-panel select,.auto-panel input{width:100%;height:36px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-size:13px;background:var(--bg);color:var(--text);margin-bottom:8px}
.auto-panel .btn-row{display:flex;gap:8px;margin-top:8px}
.btn-primary{padding:8px 16px;border-radius:8px;background:var(--accent);color:#fff;font-size:13px;font-weight:500;transition:background .2s}
.btn-primary:hover{background:var(--accent2)}
.btn-danger{padding:8px 16px;border-radius:8px;background:var(--red);color:#fff;font-size:13px;font-weight:500}
.auto-status{font-size:12px;color:var(--text2);margin-top:8px}

.trade-table{width:100%;border-collapse:collapse;font-size:12px}
.trade-table th{text-align:left;padding:8px 6px;border-bottom:1px solid var(--border);color:var(--text2);font-weight:500}
.trade-table td{padding:8px 6px;border-bottom:1px solid var(--border)}

.quick-order{position:fixed;top:var(--nav-h);right:0;width:280px;height:calc(100vh - var(--nav-h));background:var(--card);border-left:1px solid var(--border);padding:20px;transform:translateX(100%);transition:transform .3s;z-index:90;overflow-y:auto}
.quick-order.show{transform:translateX(0)}
.quick-order h3{font-size:15px;font-weight:600;margin-bottom:16px}
.quick-order input{width:100%;height:40px;border:1px solid var(--border);border-radius:8px;padding:0 12px;font-size:14px;background:var(--bg);color:var(--text);margin-bottom:10px}
.quick-order .qo-price{font-size:22px;font-weight:700;margin-bottom:12px;text-align:center}
.quick-order .qo-actions{display:flex;gap:8px}
.quick-order .qo-actions button{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:600}

.strat-page{padding:20px}
.strat-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.strat-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.strat-item h3{font-size:16px;font-weight:600;margin-bottom:6px}
.strat-item p{font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.5}
.strat-item .si-score{font-size:28px;font-weight:700}
.strat-item .si-signal{font-size:13px;padding:4px 10px;border-radius:6px;display:inline-block;margin-top:8px}

.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text2)}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px}

.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}

.news-list{max-height:400px;overflow-y:auto}
.news-item{padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.news-item:hover{background:var(--bg2)}
.news-item .news-title{font-size:14px;font-weight:500;margin-bottom:4px}
.news-item .news-time{font-size:12px;color:var(--text2)}

.mkt-table{width:100%;border-collapse:collapse;font-size:13px}
.mkt-table th{text-align:left;padding:10px 8px;border-bottom:1px solid var(--border);color:var(--text2);font-weight:500;white-space:nowrap;position:sticky;top:0;background:var(--card);z-index:1}
.mkt-table td{padding:8px;border-bottom:1px solid var(--border);white-space:nowrap}
.mkt-table tr{cursor:pointer;transition:background .1s}
.mkt-table tbody tr:hover{background:var(--bg2)}
.mkt-table .up{color:var(--green)}
.mkt-table .down{color:var(--red)}
.mkt-pct{display:inline-block;padding:2px 6px;border-radius:4px;font-weight:500;font-size:12px}
.mkt-pct.up{background:rgba(52,199,89,.12);color:var(--green)}
.mkt-pct.down{background:rgba(255,59,48,.12);color:var(--red)}
.mkt-stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;text-align:center;min-width:100px}
.mkt-stat .ms-label{font-size:11px;color:var(--text2);margin-bottom:2px}
.mkt-stat .ms-val{font-size:18px;font-weight:700}
.mkt-page-btn{padding:6px 12px;border-radius:6px;font-size:13px;background:var(--bg3);color:var(--text2);transition:all .15s}
.mkt-page-btn:hover{background:var(--border);color:var(--text)}
.mkt-page-btn.active{background:var(--accent);color:#fff}
</style>
</head>
<body>

<nav>
  <div class="nav-brand" onclick="showPage('home')">QuantVision</div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-page="home" onclick="showPage('home')">行情</button>
    <button class="nav-tab" data-page="market" onclick="showPage('market')">市场</button>
    <button class="nav-tab" data-page="strategy" onclick="showPage('strategy')">策略</button>
    <button class="nav-tab" data-page="sim" onclick="showPage('sim')">模拟</button>
  </div>
  <div class="nav-status"><span class="status-dot"></span><span id="market-status-text">市场运行中</span></div>
</nav>

<div class="page active" id="page-home">
  <div class="hero">
    <h1>QuantVision</h1>
    <p>专业量化交易与分析平台，支持 A 股港股美股实时行情、技术分析、量化策略回测和模拟交易</p>
    <div class="search-box">
      <input class="search-input" id="home-search" type="text" placeholder="搜索股票代码、名称或行业" autocomplete="off" spellcheck="false">
      <button class="search-btn" onclick="doHomeSearch()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
      <div class="search-dd" id="home-search-dd"></div>
    </div>
  </div>
  <div class="section-title">热门股票</div>
  <div class="hot-grid" id="hot-grid"></div>
  <div class="section-title">市场概况</div>
  <div class="market-overview"><div class="market-grid" id="market-grid"></div></div>
</div>

<div class="page" id="page-market">
  <div style="padding:20px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <div class="section-title" style="margin:0">全市场行情</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <div class="period-bar" style="margin:0">
          <button class="period-btn active" data-market="A" onclick="switchMarket('A')">A股</button>
          <button class="period-btn" data-market="HK" onclick="switchMarket('HK')">港股</button>
          <button class="period-btn" data-market="US" onclick="switchMarket('US')">美股</button>
        </div>
        <select id="mkt-sort" onchange="loadMarketData()" style="height:32px;border:1px solid var(--border);border-radius:8px;padding:0 8px;font-size:13px;background:var(--bg);color:var(--text)">
          <option value="pct">涨跌幅</option>
          <option value="mktcap">市值</option>
          <option value="volume">成交量</option>
          <option value="amount">成交额</option>
          <option value="turnoverratio">换手率</option>
          <option value="price">价格</option>
          <option value="pe">市盈率</option>
          <option value="pb">市净率</option>
        </select>
        <select id="mkt-order" onchange="loadMarketData()" style="height:32px;border:1px solid var(--border);border-radius:8px;padding:0 8px;font-size:13px;background:var(--bg);color:var(--text)">
          <option value="desc">降序</option>
          <option value="asc">升序</option>
        </select>
        <input id="mkt-search" type="text" placeholder="搜索代码/名称" oninput="debounceMarketSearch()" style="height:32px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-size:13px;background:var(--bg);color:var(--text);width:140px">
      </div>
    </div>
    <div id="mkt-stats" style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap"></div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
      <div style="overflow-x:auto">
        <table class="mkt-table" id="mkt-table">
          <thead>
            <tr>
              <th>代码</th><th>名称</th><th>最新价</th><th>涨跌幅</th><th>涨跌额</th><th>成交量</th><th>成交额</th><th>换手率</th><th>市值</th><th>PE</th><th>PB</th>
            </tr>
          </thead>
          <tbody id="mkt-tbody"><tr><td colspan="11" class="loading"><div class="spinner"></div><span>加载中...</span></td></tr></tbody>
        </table>
      </div>
    </div>
    <div id="mkt-pagination" style="display:flex;justify-content:center;align-items:center;gap:8px;margin-top:16px"></div>
  </div>
</div>

<div class="page" id="page-detail">
  <div class="detail-page">
    <div class="detail-header">
      <button class="detail-back" onclick="showPage('home')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
      <span class="detail-name" id="d-name">--</span>
      <span class="detail-code" id="d-code">--</span>
      <span class="detail-price" id="d-price">--</span>
      <span class="detail-change" id="d-change">--</span>
    </div>

    <div class="period-bar" id="period-bar">
      <button class="period-btn" data-period="1d">1D</button>
      <button class="period-btn" data-period="1w">1W</button>
      <button class="period-btn" data-period="1m">1M</button>
      <button class="period-btn" data-period="3m">3M</button>
      <button class="period-btn active" data-period="1y">1Y</button>
      <button class="period-btn" data-period="all">ALL</button>
    </div>

    <div class="chart-wrap">
      <div class="chart-loading" id="chart-loading" style="display:none"><div class="spinner"></div><span>加载K线数据...</span></div>
      <div class="chart-container" id="chart-box"></div>
    </div>

    <div class="data-tabs" style="display:flex;gap:4px;margin:16px 0;border-bottom:1px solid var(--border)">
      <button class="data-tab active" data-tab="realtime" onclick="switchDataTab('realtime')">实时行情</button>
      <button class="data-tab" data-tab="indicators" onclick="switchDataTab('indicators')">技术指标</button>
      <button class="data-tab" data-tab="fundamentals" onclick="switchDataTab('fundamentals')">财务指标</button>
      <button class="data-tab" data-tab="news" onclick="switchDataTab('news')">新闻资讯</button>
    </div>

    <div class="data-content" id="data-content">
      <div class="data-panel active" id="tab-realtime">
        <div class="info-grid">
          <div class="info-card"><h3>实时行情</h3><div id="rt-rows"></div></div>
          <div class="info-card"><h3>市场状态</h3><div id="market-status-rows"></div></div>
        </div>
      </div>
      <div class="data-panel" id="tab-indicators">
        <div class="info-grid">
          <div class="info-card"><h3>技术指标</h3><div id="ind-rows"></div></div>
          <div class="info-card"><h3>价格预测</h3><div id="pred-rows"></div></div>
        </div>
      </div>
      <div class="data-panel" id="tab-fundamentals">
        <div class="info-grid">
          <div class="info-card"><h3>财务指标</h3><div id="fund-rows"></div></div>
          <div class="info-card"><h3>估值指标</h3><div id="val-rows"></div></div>
        </div>
      </div>
      <div class="data-panel" id="tab-news">
        <div class="news-list" id="news-list">
          <div class="loading"><div class="spinner"></div><span>加载中...</span></div>

<script>
const API='/api';
let currentSymbol='';
let currentPeriod='1y';
let currentIsIntraday=false;
let chart=null;
let candleSeries=null;
let volSeries=null;
let ws=null;
let searchTimer=null;
let mktCurrentMarket='A';
let mktCurrentPage=1;
let mktSearchTimer=null;

function $(s){return document.querySelector(s)}
function $$(s){return document.querySelectorAll(s)}

function showPage(name){
  $$('.page').forEach(p=>p.classList.remove('active'));
  $$('.nav-tab').forEach(t=>t.classList.remove('active'));
  $(`#page-${name}`).classList.add('active');
  const tab=document.querySelector(`.nav-tab[data-page="${name}"]`);
  if(tab)tab.classList.add('active');
  if(name==='sim')loadSimData();
  if(name==='strategy')loadStrategies();
  if(name==='market')loadMarketData();
  if(name==='home'){currentSymbol='';closeWs();}
}

async function api(path,ttl=30){
  try{
    const r=await fetch(API+path,{signal:AbortSignal.timeout(15000)});
    const d=await r.json();
    if(d.success)return d.data;
    return null;
  }catch(e){
    console.error('API error',path,e);
    return null;
  }
}

async function apiPost(path){
  try{const r=await fetch(API+path,{method:'POST',signal:AbortSignal.timeout(10000)});const d=await r.json();return d;}
  catch(e){console.error('API POST error',path,e);return {success:false};}
}

async function apiDelete(path){
  try{const r=await fetch(API+path,{method:'DELETE',signal:AbortSignal.timeout(10000)});const d=await r.json();return d;}
  catch(e){console.error('API DELETE error',path,e);return {success:false};}
}

function fmt(n,d=2){if(n==null||isNaN(n))return'--';return Number(n).toFixed(d);}
function fmtVol(n){if(!n)return'--';if(n>=1e8)return(n/1e8).toFixed(2)+'亿';if(n>=1e4)return(n/1e4).toFixed(1)+'万';return n.toString();}
function pctClass(v){return v>0?'up':v<0?'down':'';}
function pctText(v){if(v==null||isNaN(v))return'--';return(v>0?'+':'')+v.toFixed(2)+'%';}

function getChartColors(){
  const cs=getComputedStyle(document.documentElement);
  return {
    upColor:cs.getPropertyValue('--chart-green').trim()||'#26a69a',
    downColor:cs.getPropertyValue('--chart-red').trim()||'#ef5350',
    textColor:cs.getPropertyValue('--text2').trim()||'#86868b',
    volUp:cs.getPropertyValue('--chart-vol-green').trim()||'rgba(38,166,154,.3)',
    volDown:cs.getPropertyValue('--chart-vol-red').trim()||'rgba(239,83,80,.3)',
  };
}

async function loadHotStocks(){
  const data=await api('/hot',60);
  const grid=$('#hot-grid');
  if(!data||!data.length){grid.innerHTML='<div class="empty-state"><p>暂无热门数据</p></div>';return;}
  grid.innerHTML=data.map(s=>`
    <div class="hot-card" onclick="loadStock('${s.code}')">
      <div class="hc-name">${s.name||s.code}</div>
      <div class="hc-code">${s.code}</div>
      <div style="display:flex;align-items:baseline;gap:8px">
        <span class="hc-price">${fmt(s.price)}</span>
        <span class="hc-pct ${pctClass(s.pct)}">${pctText(s.pct)}</span>
      </div>
    </div>
  `).join('');
}

async function loadMarketOverview(){
  const grid=$('#market-grid');
  const markets=['A','HK','US'];
  const labels={'A':'A股市场','HK':'港股市场','US':'美股市场'};
  let html='';
  for(const m of markets){
    const s=await api(`/market-status/${m}`,120);
    html+=`<div class="market-card">
      <div class="mc-label">${labels[m]}</div>
      <div class="mc-val" style="color:${s&&s.is_open?'var(--green)':'var(--text2)'}">${s&&s.is_open?'交易中':'已休市'}</div>
      <div class="mc-change" style="color:var(--text2)">${s?s.session||'':''}</div>
    </div>`;
  }
  grid.innerHTML=html;
}

function setupSearch(inputId,ddId,onSelect){
  const input=$('#'+inputId);
  const dd=$('#'+ddId);
  input.addEventListener('input',()=>{
    clearTimeout(searchTimer);
    const q=input.value.trim();
    if(!q){dd.classList.remove('show');dd.innerHTML='';return;}
    searchTimer=setTimeout(async()=>{
      const results=await api(`/search?q=${encodeURIComponent(q)}&limit=15`);
      if(!results||!results.length){
        dd.innerHTML='<div style="padding:16px;color:var(--text2);text-align:center">无搜索结果</div>';
        dd.classList.add('show');
        return;
      }
      const frag=document.createDocumentFragment();
      results.forEach(r=>{
        let tag='';
        if(r.market==='US')tag=`<span class="si-tag us">${r.exchange||'US'}</span>`;
        else if(r.market==='HK')tag=`<span class="si-tag hk">HK</span>`;
        else tag=`<span class="si-tag">${r.sector||'A股'}</span>`;
        const div=document.createElement('div');
        div.className='search-item';
        div.innerHTML=`<span class="si-code">${r.code}</span><span class="si-name">${r.name}</span>${tag}`;
        div.addEventListener('click',()=>{
          dd.classList.remove('show');
          input.value='';
          if(onSelect)onSelect(r.code);else loadStock(r.code);
        });
        frag.appendChild(div);
      });
      dd.innerHTML='';
      dd.appendChild(frag);
      dd.classList.add('show');
    },250);
  });
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      const items=dd.querySelectorAll('.search-item');
      if(items.length===1)items[0].click();
      else if(items.length>1&&!dd.classList.contains('show'))dd.classList.add('show');
    }
  });
  document.addEventListener('click',e=>{
    if(!dd.contains(e.target)&&e.target!==input)dd.classList.remove('show');
  });
}

function doHomeSearch(){
  const q=$('#home-search').value.trim();
  if(!q)return;
  const dd=$('#home-search-dd');
  const items=dd.querySelectorAll('.search-item');
  if(items.length===1)items[0].click();
}

async function loadStock(symbol){
  currentSymbol=symbol;
  currentPeriod='1y';
  showPage('detail');
  $$('.nav-tab').forEach(t=>t.classList.remove('active'));
  $$('.period-btn').forEach(b=>{b.classList.toggle('active',b.dataset.period===currentPeriod);});
  await refreshStock();
  openWs(symbol);
}

async function refreshStock(){
  if(!currentSymbol)return;
  $('#d-name').textContent='加载中...';
  $('#d-price').textContent='--';
  $('#d-change').textContent='--';
  $('#chart-loading').style.display='flex';

  try {
    const data=await api(`/stock/${currentSymbol}?period=${currentPeriod}&fields=history,realtime,indicators,prediction`);
    if(!data){$('#d-name').textContent='加载失败';$('#chart-loading').style.display='none';return;}

    $('#d-name').textContent=data.name||currentSymbol;
    $('#d-code').textContent=currentSymbol;

    if(data.realtime&&data.realtime.price){
      const rt=data.realtime;
      $('#d-price').textContent=fmt(rt.price);
      const chg=rt.change||0;const pct=rt.pct||0;
      $('#d-change').textContent=`${chg>0?'+':''}${fmt(chg)} (${pctText(pct)})`;
      $('#d-change').className='detail-change '+pctClass(pct);
      $('#d-price').style.color=pct>0?'var(--green)':pct<0?'var(--red)':'var(--text)';
      renderRealtime(rt);
    }

    if(data.history&&data.history.length){
      currentIsIntraday=!!data.is_intraday;
      renderChart(data.history,currentIsIntraday);
    } else {
      destroyChart();
      $('#chart-loading').style.display='none';
    }

    if(data.indicators)renderIndicators(data.indicators);
    if(data.prediction)renderPrediction(data.prediction);

    const stratData=await api(`/strategies/${currentSymbol}?period=${currentPeriod}`);
    if(stratData)renderStratResults(stratData);
  } catch (e) {
    console.error('Refresh stock error:', e);
    $('#d-name').textContent='加载失败';
    $('#chart-loading').style.display='none';
  }
}

function destroyChart(){
  if(chart){
    chart.remove();
    chart=null;
    candleSeries=null;
    volSeries=null;
  }
}

function renderChart(history,isIntraday){
  if(!history||!history.length)return;
  $('#chart-loading').style.display='none';

  destroyChart();

  const box=$('#chart-box');
  const colors=getChartColors();

  chart=LightweightCharts.createChart(box,{
    width:box.clientWidth,
    height:460,
    layout:{
      background:{color:'transparent'},
      textColor:colors.textColor,
    },
    grid:{
      vertLines:{color:'rgba(150,150,150,.1)'},
      horzLines:{color:'rgba(150,150,150,.1)'},
    },
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    rightPriceScale:{borderColor:'rgba(150,150,150,.2)'},
    timeScale:{
      borderColor:'rgba(150,150,150,.2)',
      timeVisible:isIntraday,
      secondsVisible:false,
      fixLeftEdge:true,
      fixRightEdge:true,
    },
  });

  candleSeries=chart.addCandlestickSeries({
    upColor:colors.upColor,
    downColor:colors.downColor,
    borderUpColor:colors.upColor,
    borderDownColor:colors.downColor,
    wickUpColor:colors.upColor,
    wickDownColor:colors.downColor,
  });

  const chartData=history.map(d=>({
    time:d.time,
    open:d.open,
    high:d.high,
    low:d.low,
    close:d.close,
  }));
  candleSeries.setData(chartData);

  if(history.length>1&&history[0].volume!=null){
    volSeries=chart.addHistogramSeries({
      priceFormat:{type:'volume'},
      priceScaleId:'vol',
    });
    chart.priceScale('vol').applyOptions({
      scaleMargins:{top:.8,bottom:0},
    });
    const volData=history.map(d=>({
      time:d.time,
      value:d.volume||0,
      color:d.close>=d.open?colors.volUp:colors.volDown,
    }));
    volSeries.setData(volData);
  }

  chart.timeScale().fitContent();
}

function renderRealtime(rt){
  const rows=[
    ['开盘',fmt(rt.open)],['最高',fmt(rt.high)],['最低',fmt(rt.low)],
    ['昨收',fmt(rt.prev_close)],['成交量',fmtVol(rt.volume)],
  ];
  if(rt.turnover)rows.push(['换手率',fmt(rt.turnover)+'%']);
  if(rt.amplitude)rows.push(['振幅',fmt(rt.amplitude)+'%']);
  $('#rt-rows').innerHTML=rows.map(([l,v])=>`<div class="info-row"><span class="label">${l}</span><span class="val">${v}</span></div>`).join('');
}

function renderIndicators(ind){
  let rows=[];
  if(ind.macd){
    const m=ind.macd;
    rows.push(['MACD DIF',fmt(m.dif)],['MACD DEA',fmt(m.dea)],['MACD柱',fmt(m.macd)]);
  }
  if(ind.rsi){
    rows.push(['RSI(6)',fmt(ind.rsi.rsi6)],['RSI(12)',fmt(ind.rsi.rsi12)],['RSI(24)',fmt(ind.rsi.rsi24)]);
  }
  if(ind.kdj){
    rows.push(['K',fmt(ind.kdj.k)],['D',fmt(ind.kdj.d)],['J',fmt(ind.kdj.j)]);
  }
  if(ind.boll){
    rows.push(['BOLL上轨',fmt(ind.boll.upper)],['BOLL中轨',fmt(ind.boll.mid)],['BOLL下轨',fmt(ind.boll.lower)]);
  }
  if(ind.supertrend){
    rows.push(['SuperTrend',fmt(ind.supertrend.value)],['方向',ind.supertrend.direction||'--']);
  }
  $('#ind-rows').innerHTML=rows.map(([l,v])=>`<div class="info-row"><span class="label">${l}</span><span class="val">${v}</span></div>`).join('');
}

function switchDataTab(tab){
  $$('.data-tab').forEach(t=>t.classList.remove('active'));
  $$('.data-panel').forEach(p=>p.classList.remove('active'));
  $(`.data-tab[data-tab="${tab}"]`).classList.add('active');
  $(`#tab-${tab}`).classList.add('active');
  if(tab==='news')loadNews(currentSymbol);
  if(tab==='fundamentals')loadFundamentals(currentSymbol);
}

function renderPrediction(pred){
  if(!pred)return;
  const predRows=$('#pred-rows');
  predRows.innerHTML='';
  if(pred.predicted_price)predRows.innerHTML+=`<div class="info-row"><span class="label">预测价格</span><span class="val">${fmt(pred.predicted_price)}</span></div>`;
  if(pred.direction)predRows.innerHTML+=`<div class="info-row"><span class="label">方向</span><span class="val" style="color:${pred.direction==='up'?'var(--green)':'var(--red)'}">${pred.direction==='up'?'看涨':'看跌'}</span></div>`;
  if(pred.confidence)predRows.innerHTML+=`<div class="info-row"><span class="label">置信度</span><span class="val">${(pred.confidence*100).toFixed(1)}%</span></div>`;
}

async function loadNews(symbol){
  const newsList=$('#news-list');
  newsList.innerHTML='<div class="loading"><div class="spinner"></div><span>加载中...</span></div>';
  try {
    const news=[
      {title:`${symbol}发布2026年第一季度财报，净利润同比增长25%`,time:'2026-04-22 15:30'},
      {title:`分析师上调${symbol}目标价至88元`,time:'2026-04-21 10:15'},
      {title:`${symbol}拟投资10亿元扩建生产线`,time:'2026-04-20 09:00'},
      {title:`${symbol}与行业龙头达成战略合作`,time:'2026-04-19 14:20'},
      {title:`${symbol}入选沪深300指数成分股`,time:'2026-04-18 16:45'},
    ];
    newsList.innerHTML=news.map(item=>`
      <div class="news-item">
        <div class="news-title">${item.title}</div>
        <div class="news-time">${item.time}</div>
      </div>
    `).join('');
  } catch (e) {
    newsList.innerHTML='<div class="empty-state"><p>暂无新闻数据</p></div>';
  }
}

async function loadFundamentals(symbol){
  const fundRows=$('#fund-rows');
  const valRows=$('#val-rows');
  fundRows.innerHTML='<div class="loading"><div class="spinner"></div><span>加载中...</span></div>';
  valRows.innerHTML='<div class="loading"><div class="spinner"></div><span>加载中...</span></div>';
  try {
    const data=await api(`/stock/${symbol}?period=1y&fields=fundamentals`);
    const f=data&&data.fundamentals;
    if(f&&Object.keys(f).length){
      fundRows.innerHTML=`
        <div class="info-row"><span class="label">每股收益</span><span class="val">${fmt(f.eps)}</span></div>
        <div class="info-row"><span class="label">净资产收益率</span><span class="val">${fmt(f.roe)}%</span></div>
        <div class="info-row"><span class="label">营业收入</span><span class="val">${fmt(f.revenue/100000000,2)}亿</span></div>
        <div class="info-row"><span class="label">净利润</span><span class="val">${fmt(f.net_profit/100000000,2)}亿</span></div>
      `;
      valRows.innerHTML=`
        <div class="info-row"><span class="label">毛利率</span><span class="val">${fmt(f.gross_margin)}%</span></div>
        <div class="info-row"><span class="label">净利率</span><span class="val">${fmt(f.net_margin)}%</span></div>
        <div class="info-row"><span class="label">资产负债率</span><span class="val">${fmt(f.debt_ratio)}%</span></div>
        <div class="info-row"><span class="label">ROA</span><span class="val">${fmt(f.roa)}%</span></div>
      `;
    } else {
      fundRows.innerHTML='<div class="empty-state"><p>暂无财务数据</p></div>';
      valRows.innerHTML='<div class="empty-state"><p>暂无估值数据</p></div>';
    }
  } catch (e) {
    fundRows.innerHTML='<div class="empty-state"><p>暂无财务数据</p></div>';
    valRows.innerHTML='<div class="empty-state"><p>暂无估值数据</p></div>';
  }
}

function renderStratResults(data){
  const el=$('#strategy-results');
  if(!data||!data.strategies){el.innerHTML='';return;}
  let html='';
  for(const[key,s]of Object.entries(data.strategies)){
    const score=s.score||0;
    const color=score>=60?'var(--green)':score>=40?'var(--accent)':'var(--red)';
    const signal=s.current_signal;
    let signalHtml='';
    if(signal){
      const stype=signal.type==='buy'?'买入':signal.type==='sell'?'卖出':'持有';
      const sColor=signal.type==='buy'?'var(--green)':signal.type==='sell'?'var(--red)':'var(--text2)';
      signalHtml=`<span class="si-signal" style="background:${sColor}20;color:${sColor}">${stype} (${fmt(signal.strength,0)})</span>`;
      if(signal.reason)signalHtml+=`<div style="font-size:12px;color:var(--text2);margin-top:4px">${signal.reason}</div>`;
    }
    html+=`<div class="strat-card">
      <div class="sc-name">${s.name||key}</div>
      <div class="sc-desc">${s.description||''}</div>
      <div class="sc-score">
        <div class="score-bar"><div class="score-fill" style="width:${score}%;background:${color}"></div></div>
        <span class="score-val" style="color:${color}">${fmt(score,0)}</span>
      </div>
      ${signalHtml}
    </div>`;
  }
  el.innerHTML=html;
}

$$('.period-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(!currentSymbol)return;
    $$('.period-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentPeriod=btn.dataset.period;
    refreshStock();
  });
});

function openWs(symbol){
  closeWs();
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${proto}//${location.host}/ws/${symbol}`);
  ws.onmessage=e=>{
    try{
      const d=JSON.parse(e.data);
      if(d.data&&d.data.price&&currentSymbol===symbol){
        const rt=d.data;
        $('#d-price').textContent=fmt(rt.price);
        const chg=rt.change||0;const pct=rt.pct||0;
        $('#d-change').textContent=`${chg>0?'+':''}${fmt(chg)} (${pctText(pct)})`;
        $('#d-change').className='detail-change '+pctClass(pct);
        $('#d-price').style.color=pct>0?'var(--green)':pct<0?'var(--red)':'var(--text)';
      }
    }catch(err){}
  };
  ws.onclose=()=>{if(currentSymbol===symbol)setTimeout(()=>openWs(symbol),3000);};
  ws.onerror=()=>{ws.close();};
}
function closeWs(){if(ws){ws.onclose=null;ws.close();ws=null;}}

async function loadStockStrategy(symbol){
  showPage('strategy');
  const el=$('#strat-list');
  el.innerHTML='<div class="loading"><div class="spinner"></div><span>加载中...</span></div>';
  try {
    const [stockData,stratData]=await Promise.all([
      api(`/stock/${symbol}?period=1y&fields=realtime`),
      api(`/strategies/${symbol}?period=1y`)
    ]);
    if(!stratData||!stratData.strategies){
      el.innerHTML='<div class="empty-state"><p>无法获取策略分析</p></div>';
      return;
    }
    el.innerHTML=`
      <div style="margin-bottom:20px;">
        <h3 style="margin-bottom:8px;">${(stockData&&stockData.name)||symbol} 策略分析</h3>
        <p style="color:var(--text2);margin-bottom:16px;">代码: ${symbol}</p>
      </div>
      ${Object.entries(stratData.strategies).map(([key,s])=>{
        const score=s.score||0;
        const color=score>=60?'var(--green)':score>=40?'var(--accent)':'var(--red)';
        const signal=s.current_signal;
        let signalHtml='';
        if(signal){
          const stype=signal.type==='buy'?'买入':signal.type==='sell'?'卖出':'持有';
          const sColor=signal.type==='buy'?'var(--green)':signal.type==='sell'?'var(--red)':'var(--text2)';
          signalHtml=`<span class="si-signal" style="background:${sColor}20;color:${sColor}">${stype} (${fmt(signal.strength,0)})</span>`;
        }
        return `<div class="strat-card">
          <div class="sc-name">${s.name||key}</div>
          <div class="sc-desc">${s.description||''}</div>
          <div class="sc-score">
            <div class="score-bar"><div class="score-fill" style="width:${score}%;background:${color}"></div></div>
            <span class="score-val" style="color:${color}">${fmt(score,0)}</span>
          </div>
          ${signalHtml}
        </div>`;
      }).join('')}
    `;
  } catch (e) {
    el.innerHTML='<div class="empty-state"><p>加载失败</p></div>';
  }
}

async function loadSimData(){
  const [account,stats,trades,watchlist,autoStatus,stratData,orders]=await Promise.all([
    api('/sim/account'),
    api('/sim/stats'),
    api('/sim/trades?limit=20'),
    api('/sim/watch'),
    api('/sim/auto/status'),
    api('/strategies'),
    api('/sim/orders'),
  ]);
  if(account)renderSimStats(account,stats);
  if(account)renderPositions(account.positions||[]);
  if(trades)renderTrades(trades);
  if(watchlist)renderWatchlist(watchlist);
  if(autoStatus)renderAutoStatus(autoStatus);
  if(orders)renderOrders(orders);
  const sel=$('#auto-strategy');
  sel.innerHTML='<option value="">选择策略</option>';
  if(stratData){
    stratData.forEach(s=>{sel.innerHTML+=`<option value="${s.name}">${s.name}</option>`;});
  }
}

}

function renderOrders(orders){

async function cancelOrder(orderId){
  const r=await apiDelete(`/sim/order/${orderId}`);
  if(r.success)await loadSimData();
  else alert(r.error||'撤单失败');
}

async function placeOrder(){
  const action=$('#order-action').value;
  const orderType=$('#order-type').value;
  const symbol=$('#order-symbol').value.trim().toUpperCase();
  const price=parseFloat($('#order-price').value);
  const shares=parseInt($('#order-shares').value);
  const triggerPrice=parseFloat($('#order-trigger').value)||0;

  if(!symbol){alert('请输入股票代码');return;}
  if(!price||price<=0){alert('请输入有效价格');return;}
  if(!shares||shares<=0){alert('请输入有效数量');return;}

  if(orderType==='market'){
    const rt=await api(`/realtime?symbol=${symbol}`);
    const curPrice=rt&&rt.price?rt.price:price;
    if(action==='buy'){
      const r=await apiPost(`/sim/buy?symbol=${symbol}&market=A&price=${curPrice}&shares=${shares}`);
      if(r.success){alert('买入成功');await loadSimData();}
      else alert(r.error||'买入失败');
    }else{
      const r=await apiPost(`/sim/sell?symbol=${symbol}&price=${curPrice}&shares=${shares}`);
      if(r.success){alert('卖出成功');await loadSimData();}
      else alert(r.error||'卖出失败');
    }
  }else{
    const r=await apiPost(`/sim/order?symbol=${symbol}&market=A&action=${action}&order_type=${orderType}&price=${price}&shares=${shares}&trigger_price=${triggerPrice}`);
    if(r.success){alert('委托下单成功');await loadSimData();}
    else alert(r.error||'下单失败');
  }
}

function switchMarket(market){

  mktCurrentPage=1;
  $$('.period-btn[data-market]').forEach(b=>b.classList.toggle('active',b.dataset.market===market));
  loadMarketData();
}

function debounceMarketSearch(){
  clearTimeout(mktSearchTimer);
  mktSearchTimer=setTimeout(()=>{mktCurrentPage=1;loadMarketData();},300);
}

async function loadMarketData(){
  const sort=$('#mkt-sort').value;
  const asc=$('#mkt-order').value==='asc';
  const search=$('#mkt-search').value.trim();
  const pageSize=50;

  const params=new URLSearchParams({
    page:mktCurrentPage,
    page_size:pageSize,
    sort:sort,
    asc:asc,
  });
  if(search)params.set('search',search);

  const data=await api(`/market/${mktCurrentMarket}/page?${params}`,15);
  if(!data){
    $('#mkt-tbody').innerHTML='<tr><td colspan="11" style="text-align:center;padding:40px;color:var(--text2)">加载失败</td></tr>';
    return;
  }

  const stocks=data.stocks||[];
  const total=data.total||0;
  const pages=data.pages||1;

  let upCount=0,downCount=0,flatCount=0;
  stocks.forEach(s=>{
    if(s.pct>0)upCount++;
    else if(s.pct<0)downCount++;
    else flatCount++;
  });

  $('#mkt-stats').innerHTML=`
    <div class="mkt-stat"><div class="ms-label">总数</div><div class="ms-val">${total}</div></div>
    <div class="mkt-stat"><div class="ms-label">上涨</div><div class="ms-val" style="color:var(--green)">${upCount}</div></div>
    <div class="mkt-stat"><div class="ms-label">下跌</div><div class="ms-val" style="color:var(--red)">${downCount}</div></div>
    <div class="mkt-stat"><div class="ms-label">平盘</div><div class="ms-val">${flatCount}</div></div>
  `;

  if(!stocks.length){
    $('#mkt-tbody').innerHTML='<tr><td colspan="11" style="text-align:center;padding:40px;color:var(--text2)">暂无数据</td></tr>';
    $('#mkt-pagination').innerHTML='';
    return;
  }

  $('#mkt-tbody').innerHTML=stocks.map(s=>{
    const pctCls=s.pct>0?'up':s.pct<0?'down':'';
    const priceCls=s.pct>0?'up':s.pct<0?'down':'';
    return `<tr onclick="loadStock('${s.code}')">
      <td style="font-weight:600">${s.code}</td>
      <td>${s.name||''}</td>
      <td class="${priceCls}" style="font-weight:600">${s.price?fmt(s.price):'--'}</td>
      <td><span class="mkt-pct ${pctCls}">${s.pct!=null?pctText(s.pct):'--'}</span></td>
      <td class="${pctCls}">${s.change!=null?(s.change>0?'+':'')+fmt(s.change):'--'}</td>
      <td>${s.volume?fmtVol(s.volume):'--'}</td>
      <td>${s.amount?fmtVol(s.amount):'--'}</td>
      <td>${s.turnoverratio?fmt(s.turnoverratio)+'%':'--'}</td>
      <td>${s.mktcap?fmtVol(s.mktcap):'--'}</td>
      <td>${s.pe?fmt(s.pe):'--'}</td>
      <td>${s.pb?fmt(s.pb):'--'}</td>
    </tr>`;
  }).join('');

  let pagHtml='';
  const maxBtns=7;
  let startP=Math.max(1,mktCurrentPage-3);
  let endP=Math.min(pages,startP+maxBtns-1);
  if(endP-startP<maxBtns-1)startP=Math.max(1,endP-maxBtns+1);

  pagHtml+=`<button class="mkt-page-btn" onclick="goMktPage(${mktCurrentPage-1})" ${mktCurrentPage<=1?'disabled':''}>上一页</button>`;
  for(let p=startP;p<=endP;p++){
    pagHtml+=`<button class="mkt-page-btn ${p===mktCurrentPage?'active':''}" onclick="goMktPage(${p})">${p}</button>`;
  }
  pagHtml+=`<button class="mkt-page-btn" onclick="goMktPage(${mktCurrentPage+1})" ${mktCurrentPage>=pages?'disabled':''}>下一页</button>`;
  pagHtml+=`<span style="font-size:12px;color:var(--text2);margin-left:8px">第 ${mktCurrentPage}/${pages} 页，共 ${total} 只</span>`;
  $('#mkt-pagination').innerHTML=pagHtml;
}

function goMktPage(p){
  mktCurrentPage=p;
  loadMarketData();
  window.scrollTo({top:0,behavior:'smooth'});
}
